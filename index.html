<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">	
    <title>Join Email List</title>
    <link rel="stylesheet" href="styles.css">
    <script src="email_list.js" defer></script>
</head>
<body>
    <main>
        <h1>Please join our email list</h1>
        <form id="email_form" name="email_form" action="join.html" method="get">
         <div>
            <label for="email_address1">Email Address:</label>
            <input type="text" id="email_address1" name="email_address1"><br>
        </div>
        <div>
            <label for="email_address2">Re-enter Email Address:</label>
            <input type="text" id="email_address2" name="email_address2"><br>
        </div>
        <div>
            <label for="first_name">First Name</label>
            <input type="text" id="first_name" name="first_name"><br>
        </div>
        <span id="error_message" style="color: red; height: 1.2em;"></span>
        <div class="button-group">
            <button type="submit" id="join_list">Join our List</button>
            <button type="reset" id="clear_btn">Clear Form</button>
        </div> 
      </form>
    </main>
</body>
</html>
